<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Trainingsplan · Alex Dashboard</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #050506;
  --bg-card: rgba(255, 255, 255, 0.04);
  --border: rgba(255, 255, 255, 0.06);
  --text-primary: #FAFAFA;
  --text-secondary: #B8B6B0;
  --text-tertiary: #76746E;
  --accent: #6EE7B7;
  --accent-2: #67E8F9;
  --font: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif;
}

html, body {
  background: var(--bg);
  color: var(--text-secondary);
  font-family: var(--font);
  font-size: 15px;
  line-height: 1.5;
  min-height: 100vh;
}

main {
  max-width: 720px;
  margin: 0 auto;
  padding: 56px 20px 80px;
}

.title {
  font-size: 28px;
  font-weight: 700;
  color: var(--text-primary);
  margin-bottom: 24px;
}

.tabs {
  display: flex;
  gap: 8px;
  margin-bottom: 24px;
  overflow-x: auto;
  padding-bottom: 8px;
}

.tab-btn {
  flex-shrink: 0;
  padding: 10px 16px;
  border: 1px solid var(--border);
  background: rgba(255, 255, 255, 0.04);
  color: var(--text-secondary);
  border-radius: 10px;
  cursor: pointer;
  font-weight: 600;
  font-size: 13px;
  transition: all 0.2s;
}

.tab-btn.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #04140d;
}

.tab-btn:hover {
  border-color: var(--accent);
}

.workout-list {
  display: grid;
  gap: 12px;
}

.exercise {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px;
  display: flex;
  gap: 12px;
  align-items: flex-start;
  transition: all 0.2s;
  cursor: pointer;
}

.exercise:hover {
  border-color: var(--accent);
  background: rgba(110, 231, 183, 0.05);
}

.exercise input[type="checkbox"] {
  width: 20px;
  height: 20px;
  margin-top: 2px;
  cursor: pointer;
  accent-color: var(--accent);
  flex-shrink: 0;
}

.exercise.done {
  opacity: 0.6;
}

.exercise.done .exercise-name {
  text-decoration: line-through;
  color: var(--text-tertiary);
}

.exercise-info {
  flex: 1;
  min-width: 0;
}

.exercise-name {
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 4px;
}

.exercise-details {
  font-size: 12px;
  color: var(--text-tertiary);
  display: grid;
  gap: 2px;
}

.exercise-meta {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  margin-top: 6px;
}

.meta-item {
  font-size: 11px;
  background: rgba(110, 231, 183, 0.1);
  padding: 3px 8px;
  border-radius: 4px;
  color: var(--accent);
}

.progress-bar {
  width: 100%;
  height: 4px;
  background: rgba(255, 255, 255, 0.05);
  border-radius: 2px;
  margin-top: 16px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--accent-2));
  transition: width 0.3s;
}

.progress-text {
  font-size: 12px;
  color: var(--text-tertiary);
  margin-top: 8px;
  text-align: center;
}

.day-header {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-tertiary);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 12px;
  margin-top: 8px;
}
</style>
</head>
<body>
<main>
  <h1 class="title">Trainingsplan</h1>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchDay('oberkörper')">Oberkörper</button>
    <button class="tab-btn" onclick="switchDay('beine')">Beine</button>
    <button class="tab-btn" onclick="switchDay('push')">Push</button>
    <button class="tab-btn" onclick="switchDay('pull')">Pull</button>
  </div>

  <div id="workoutList" class="workout-list"></div>

  <div class="progress-bar">
    <div class="progress-fill" id="progressFill" style="width: 0%"></div>
  </div>
  <div class="progress-text" id="progressText">0/0 Übungen fertig</div>
</main>

<script>
const TRAINING_PLAN = {
  oberkörper: [
    { id: 'ok-1', name: 'Schultterdrücken', muscle: 'Schulter', reps: '8-15', sets: 3 },
    { id: 'ok-2', name: 'Klimmzüge', muscle: 'Rücken', reps: '5-8', sets: 5 },
    { id: 'ok-3', name: 'Dips', muscle: 'Brust', reps: '5-8', sets: 5 },
    { id: 'ok-4', name: 'Breites Rudern', muscle: 'Rücken', reps: '8-10', sets: 2 },
    { id: 'ok-5', name: 'Butterfly', muscle: 'Brust', reps: '6-10', sets: 2 },
    { id: 'ok-6', name: 'Seitheben', muscle: 'Schulter', reps: '8-10', sets: 2 },
    { id: 'ok-7', name: 'Dragon Flys', muscle: 'Core', sets: 4 }
  ],
  beine: [
    { id: 'b-1', name: 'Zercher Squads', reps: '8-10', sets: 2, notes: 'langsam runter, Füße etwas vor der Stange' },
    { id: 'b-2', name: 'Beinbeuger', reps: '10-12', sets: 2, notes: 'Füße etwas weiter unten auf der Plattform' },
    { id: 'b-3', name: 'Beinstrecker', reps: '10-12', sets: 2, notes: 'Schritte Mittelgroß' },
    { id: 'b-4', name: 'Bizepsmaschine', reps: '15-20', sets: 3 },
    { id: 'b-5', name: 'Einarmiges Trizepsdrücken', reps: '12-15', sets: 3 },
    { id: 'b-6', name: 'Hammercurls', reps: '8-12', sets: 2 }
  ],
  push: [
    { id: 'p-1', name: 'Schultterdrücken', muscle: 'Schulter', reps: '8-10', sets: 3 },
    { id: 'p-2', name: 'Lat Maschine', reps: '8-10', sets: 2 },
    { id: 'p-3', name: 'Einhand rudern am Seil', reps: '8-10', sets: 2 },
    { id: 'p-4', name: 'Schrägbankdrücken', reps: '10-12', sets: 2 },
    { id: 'p-5', name: 'Butterfly', reps: '6-10', sets: 2 },
    { id: 'p-6', name: 'Seitheben am Seil', reps: '10-15', sets: 3 },
    { id: 'p-7', name: 'Dragon Flys', sets: 4 }
  ],
  pull: [
    { id: 'pl-1', name: 'SLDL Langhantel', muscle: 'Hamstrings, Glute', reps: '6-8', sets: 2, notes: 'laaaaaangsam runter, jeden CM kontrollieren' },
    { id: 'pl-2', name: 'Beinpresse', reps: '10-12', sets: 2 },
    { id: 'pl-3', name: 'Walking lunges', reps: '12-15', sets: 2 },
    { id: 'pl-4', name: 'Arschübung', reps: '6-10', sets: 2 },
    { id: 'pl-5', name: 'Bizepscuris maschine', reps: '10-15', sets: 3 },
    { id: 'pl-6', name: 'Hammercurls hinten gestützt', reps: '8-12', sets: 2 },
    { id: 'pl-7', name: 'Einarmiges Trizepsdrücken', reps: '6-10', sets: 3 },
    { id: 'pl-8', name: 'Trizepsdrücken Seil mit langer Stange', reps: '8-12', sets: 2 }
  ]
};

let currentDay = 'oberkörper';
let checkedExercises = {};

function loadState() {
  try {
    const saved = sessionStorage.getItem('workout:checked');
    if (saved) checkedExercises = JSON.parse(saved);
  } catch (e) {
    console.log('Could not load state', e);
  }
}

function saveState() {
  try {
    sessionStorage.setItem('workout:checked', JSON.stringify(checkedExercises));
  } catch (e) {
    console.log('Could not save state', e);
  }
}

function switchDay(day) {
  currentDay = day;
  document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
  event.target.classList.add('active');
  render();
}

function toggleExercise(id) {
  checkedExercises[id] = !checkedExercises[id];
  saveState();
  render();
}

function render() {
  const exercises = TRAINING_PLAN[currentDay];
  const list = document.getElementById('workoutList');

  const completed = Object.values(checkedExercises).filter(v => v).length;
  const total = exercises.length;
  const progress = total > 0 ? (completed / total) * 100 : 0;

  document.getElementById('progressFill').style.width = progress + '%';
  document.getElementById('progressText').textContent = `${completed}/${total} Übungen fertig`;

  list.innerHTML = exercises.map(ex => `
    <div class="exercise ${checkedExercises[ex.id] ? 'done' : ''}" onclick="toggleExercise('${ex.id}')">
      <input type="checkbox" ${checkedExercises[ex.id] ? 'checked' : ''} onchange="event.stopPropagation(); toggleExercise('${ex.id}')">
      <div class="exercise-info">
        <div class="exercise-name">${ex.name}</div>
        <div class="exercise-details">
          ${ex.muscle ? `<div>💪 ${ex.muscle}</div>` : ''}
          ${ex.reps ? `<div>Wiederholungen: ${ex.reps} × ${ex.sets} Sätze</div>` : `<div>Sätze: ${ex.sets}</div>`}
          ${ex.notes ? `<div>📝 ${ex.notes}</div>` : ''}
        </div>
        ${ex.reps ? `
          <div class="exercise-meta">
            <span class="meta-item">${ex.reps} Wdh.</span>
            <span class="meta-item">${ex.sets} Sätze</span>
          </div>
        ` : `
          <div class="exercise-meta">
            <span class="meta-item">${ex.sets} Sätze</span>
          </div>
        `}
      </div>
    </div>
  `).join('');
}

loadState();
render();
</script>
</body>
</html>
