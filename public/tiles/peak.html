<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nova · AI Coach</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --accent: #6EE7B7;
  --accent-2: #67E8F9;
  --bg: #05060c;
  --fg: #e9ecf5;
  --muted: rgba(233,236,245,.55);
  --line: rgba(255,255,255,.1);
}
html, body {
  background: var(--bg);
  font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
  color: var(--fg);
  min-height: 100vh;
}

.wrap { max-width: 560px; margin: 0 auto; padding: 28px 18px 60px; }
.top { display: flex; align-items: center; gap: 14px; margin-bottom: 20px; }
.key-toggle { margin-left: auto; border: 1px solid var(--line); background: rgba(255,255,255,.03); border-radius: 10px; padding: 7px 10px; cursor: pointer; font-size: 15px; line-height: 1; opacity: .55; transition: opacity .15s; }
.key-toggle:hover { opacity: 1; }
.key-toggle.has-key { opacity: 1; border-color: var(--accent); }
.keypanel { display: none; }
.keypanel.open { display: block; }

.orb { width: 60px; height: 60px; border-radius: 50%; position: relative; flex-shrink: 0;
  background: radial-gradient(circle at 32% 28%, #eafff6, var(--accent) 42%, #1f8f66 100%);
  box-shadow: 0 0 22px -2px var(--accent), inset 0 -6px 14px rgba(0,0,0,.25);
  animation: orbFloat 4s ease-in-out infinite;
}
.orb::before, .orb::after {
  content: '';
  position: absolute;
  top: 38%;
  width: 9px;
  height: 9px;
  border-radius: 50%;
  background: #06281d;
  box-shadow: 0 0 6px rgba(0,0,0,.4);
  transition: height .15s;
}
.orb::before { left: 30%; }
.orb::after { right: 30%; }
.orb.think { animation: orbFloat 1.1s ease-in-out infinite, orbPulse 1.1s ease-in-out infinite; }
.orb.happy::before, .orb.happy::after { height: 4px; border-radius: 0 0 9px 9px; }
@keyframes orbFloat { 0%,100% { transform: translateY(0) } 50% { transform: translateY(-6px) } }
@keyframes orbPulse { 0%,100% { box-shadow: 0 0 22px -2px var(--accent) } 50% { box-shadow: 0 0 34px 2px var(--accent) } }

.title h1 { font-family: 'Times New Roman', Georgia, serif; font-style: italic; font-size: 26px; font-weight: 500;
  background: linear-gradient(90deg, var(--accent-2), var(--accent)); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
}
.title .role { font-family: ui-monospace, monospace; font-size: 10px; letter-spacing: .24em; text-transform: uppercase; color: var(--muted); margin-top: 3px; }

.keybar { display: flex; gap: 8px; margin-bottom: 16px; }
.keybar input { flex: 1; background: rgba(255,255,255,.03); border: 1px solid var(--line); color: var(--fg); border-radius: 10px; padding: 11px 13px; font-size: 13px; outline: none; }
.keybar input:focus { border-color: var(--accent); }
.keybar button { border: 0; border-radius: 10px; padding: 0 16px; cursor: pointer; color: #04140d; background: var(--accent); font-weight: 600; font-size: 13px; height: 44px; }
.hint { font-size: 12px; color: var(--muted); line-height: 1.5; margin-bottom: 18px; }
.hint a { color: var(--accent-2); }
.hint.saved { color: var(--accent); }

.feed { display: flex; flex-direction: column; gap: 12px; margin-bottom: 16px; min-height: 200px; max-height: 400px; overflow-y: auto; }
.msg { max-width: 90%; }
.msg.user { align-self: flex-end; }
.msg.coach { align-self: flex-start; width: 100%; }
.bubble { border-radius: 14px; padding: 13px 15px; font-size: 14.5px; line-height: 1.55; }
.msg.user .bubble { background: rgba(255,255,255,.05); border: 1px solid var(--line); }
.msg.coach .bubble { background: rgba(255,255,255,.04); border: 1px solid color-mix(in srgb, var(--accent) 40%, transparent); border-left: 3px solid var(--accent); }
.tag { display: inline-block; margin-bottom: 9px; font-family: ui-monospace, monospace; font-size: 9.5px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: #04140d; background: var(--accent); padding: 3px 9px; border-radius: 999px; }
.bubble b, .pill { color: var(--accent); font-weight: 700; }
.pill { background: color-mix(in srgb, var(--accent) 18%, transparent); padding: 1px 7px; border-radius: 6px; font-weight: 600; }
.reply-list { margin: 6px 0 0; padding-left: 18px; display: grid; gap: 6px; }
.reply-list li { line-height: 1.45; }
.dots { display: inline-flex; gap: 5px; }
.dots i { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); opacity: .4; animation: d 1.2s ease-in-out infinite; }
.dots i:nth-child(2){animation-delay:.2s}
.dots i:nth-child(3){animation-delay:.4s}
@keyframes d { 0%,100%{opacity:.35;transform:scale(1)} 50%{opacity:1;transform:scale(1.4)} }

.composer { display: flex; gap: 9px; }
.composer input { flex: 1; background: rgba(255,255,255,.03); border: 1px solid var(--line); color: var(--fg); border-radius: 12px; padding: 13px 15px; font-size: 14.5px; outline: none; height: 44px; }
.composer input:focus { border-color: var(--accent); }
.composer button { width: 50px; border: 0; border-radius: 12px; cursor: pointer; color: #04140d; background: var(--accent); font-size: 18px; }
.composer button:active { transform: scale(.94); }
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="orb" id="orb"></div>
    <div class="title"><h1>Nova</h1><div class="role">Dein Mentor</div></div>
    <button id="keyToggle" class="key-toggle" title="API-Schlüssel">🔑</button>
  </div>

  <div class="keypanel" id="keypanel">
    <div class="keybar">
      <input id="keyInput" type="password" placeholder="Anthropic-API-Schlüssel (sk-ant-…)" autocomplete="off" />
      <button id="keySave">Speichern</button>
    </div>
    <div class="hint" id="hint">
      Dein Schlüssel wird nur in <b>diesem Browser</b> gespeichert.
      Hol dir einen bei <a href="https://console.anthropic.com/api/keys" target="_blank" rel="noopener">console.anthropic.com</a>.
    </div>
  </div>

  <div class="feed" id="feed"></div>

  <div class="composer">
    <input id="chatInput" placeholder="Frag Nova alles…" autocomplete="off" />
    <button id="send">→</button>
  </div>
</div>

<script>
(function(){
  const feed = document.getElementById('feed');
  const input = document.getElementById('chatInput');
  const orb = document.getElementById('orb');
  const keyInput = document.getElementById('keyInput');
  const hint = document.getElementById('hint');
  const keypanel = document.getElementById('keypanel');
  const keyToggle = document.getElementById('keyToggle');

  keyToggle.addEventListener('click', () => keypanel.classList.toggle('open'));

  // Vitality Bridge für localStorage in iframe
  const Vitality = {
    async save(data) {
      if (window.parent?.Vitality) return window.parent.Vitality.save(data);
      try { localStorage.setItem('peak:data', JSON.stringify(data)); } catch(e){}
    },
    async load() {
      if (window.parent?.Vitality) return window.parent.Vitality.load();
      try { return JSON.parse(localStorage.getItem('peak:data') || '{}'); } catch(e) { return {}; }
    }
  };

  function esc(s){ return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
  function setOrb(s){ orb.className = 'orb' + (s ? ' ' + s : ''); }

  let state = { apiKey: '', messages: [] };

  // Load state
  async function loadState() {
    const data = await Vitality.load();
    state = data || { apiKey: '', messages: [] };
    if (state.apiKey) {
      hint.classList.add('saved');
      hint.innerHTML = '✓ API-Schlüssel gespeichert. Frag mich etwas.';
      keyInput.placeholder = '••••••••••••••••';
      keyToggle.classList.add('has-key');
    }
  }

  // Save key
  document.getElementById('keySave').addEventListener('click', async () => {
    const k = keyInput.value.trim();
    if (!k) { alert('API-Schlüssel erforderlich'); return; }
    state.apiKey = k;
    state.messages = [];
    await Vitality.save(state);
    keyInput.value = '';
    keyInput.placeholder = '••••••••••••••••';
    hint.classList.add('saved');
    hint.innerHTML = '✓ API-Schlüssel gespeichert. Frag mich etwas.';
    keyToggle.classList.add('has-key');
    keypanel.classList.remove('open');
    feed.innerHTML = '';
    addCoach('Ready! Was möchtest du wissen?');
  });

  function render(text){
    const lines = String(text).split(/\r?\n/).map(l => l.trim()).filter(Boolean);
    const items = [], loose = [];
    for (const l of lines){
      if (/^[-•*]\s+/.test(l)) items.push('<li>' + esc(l.replace(/^[-•*]\s+/, '')) + '</li>');
      else loose.push(esc(l));
    }
    let html = loose.join('<br>');
    if (items.length) html += (html ? '<br>' : '') + '<ul class="reply-list">' + items.join('') + '</ul>';
    return html;
  }

  function addUser(t){
    const e = document.createElement('div');
    e.className = 'msg user';
    e.innerHTML = '<div class="bubble">' + esc(t) + '</div>';
    feed.appendChild(e);
    feed.scrollTop = feed.scrollHeight;
  }

  function addCoach(html){
    const e = document.createElement('div');
    e.className = 'msg coach';
    e.innerHTML = '<div class="bubble"><span class="tag">Nova</span><div>' + html + '</div></div>';
    feed.appendChild(e);
    feed.scrollTop = feed.scrollHeight;
    return e;
  }

  const SYS = "Du bist Nova, Mentor im Life-Tracking-Dashboard. Antworte auf Deutsch mit kurzen Stichpunkten. Nutze - Aufzählungen. Sei konkret und ermutigend.";

  let busy = false;
  async function ask(text){
    text = (text||'').trim();
    if (!text || busy) return;

    if (!state.apiKey){
      addCoach('- Füge oben deinen **API-Schlüssel** ein');
      return;
    }

    busy = true;
    addUser(text);
    input.value = '';
    setOrb('think');
    const loading = addCoach('<span class="dots"><i></i><i></i><i></i></span>');

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'content-type': 'application/json',
          'x-api-key': state.apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true',
        },
        body: JSON.stringify({
          model: 'claude-opus-4-8',
          max_tokens: 500,
          system: SYS,
          messages: [{ role: 'user', content: text }],
        }),
      });

      const json = await res.json();

      if (json.error){
        const msg = json.error.message || 'Fehler — API-Schlüssel prüfen';
        loading.querySelector('div:last-child').innerHTML = render('- ' + msg);
        setOrb('');
        busy = false;
        return;
      }

      const reply = (json.content && json.content[0] && json.content[0].text) || '- Hmm, keine Antwort.';
      loading.querySelector('div:last-child').innerHTML = render(reply);
      setOrb('happy');
      setTimeout(() => setOrb(''), 2500);
    } catch(e){
      loading.querySelector('div:last-child').innerHTML = render('- Verbindungsfehler: ' + e.message);
      setOrb('');
    }
    busy = false;
  }

  document.getElementById('send').addEventListener('click', () => ask(input.value));
  input.addEventListener('keydown', e => { if (e.key === 'Enter') ask(input.value); });

  loadState().then(() => {
    if (!state.apiKey) {
      addCoach('- Hallo, ich bin **Nova** 🧠<br>- Trag oben deinen API-Schlüssel ein<br>- Dann frag mich zu Training, Zielen oder Ernährung');
    } else {
      addCoach('- Willkommen zurück!<br>- Ich bin bereit. Was brauchst du?');
    }
  });
})();
</script>
</body>
</html>
